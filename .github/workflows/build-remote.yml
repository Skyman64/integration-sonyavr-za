name: Build for Remote 3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build aarch64 binary with PyInstaller
      run: |
        docker run --rm \
          -v "$PWD":/workspace \
          -w /workspace \
          docker.io/unfoldedcircle/r2-pyinstaller:3.11.6 \
          bash -c "python -m pip install -r requirements.txt && \
                   pyinstaller --clean --onefile --name driver src/driver.py"

    - name: Create artifact package
      run: |
        mkdir -p artifacts/bin
        cp dist/driver artifacts/bin/driver
        cp driver.json artifacts/
        cp sony.png artifacts/
        cd artifacts && tar czf ../uc-intg-sonyavr-za-aarch64.tar.gz * && cd ..
        ls -lh uc-intg-sonyavr-za-aarch64.tar.gz

    - name: Upload as artifact
      uses: actions/upload-artifact@v4
      with:
        name: sony-avr-remote-binary
        path: uc-intg-sonyavr-za-aarch64.tar.gz
        retention-days: 30
