name: Build for Remote 3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker
      run: docker --version

    - name: Build binary with PyInstaller
      run: |
        set -e
        echo "Installing dependencies..."
        docker run --rm -v "$PWD":/workspace -w /workspace \
          docker.io/unfoldedcircle/r2-pyinstaller:3.11.6 \
          pip install -r requirements.txt
        
        echo "Building binary..."
        docker run --rm -v "$PWD":/workspace -w /workspace \
          docker.io/unfoldedcircle/r2-pyinstaller:3.11.6 \
          pyinstaller --clean --onefile --name driver src/driver.py

    - name: Package archive
      run: |
        mkdir -p artifacts/bin
        cp dist/driver artifacts/bin/
        cp driver.json sony.png artifacts/
        cd artifacts
        tar czf ../uc-intg-sonyavr-za-aarch64.tar.gz .
        cd ..
        ls -lh uc-intg-sonyavr-za-aarch64.tar.gz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sony-avr-remote-binary
        path: uc-intg-sonyavr-za-aarch64.tar.gz
        retention-days: 30
